name: Test Suite

on:
  push:
    branches: [ main, nightly, refactor/sidecar ]
  pull_request:
    branches: [ main, nightly ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

    - name: Install all dependencies
      run: uv sync --all-extras

    - name: Run tests (upstream + sidecar patches)
      run: uv run pytest tests/ -q

  console-ui:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: console-ui/package-lock.json

    - name: Install and build Console UI
      working-directory: console-ui
      run: npm ci && npm run build

    - name: Verify build output
      run: test -f console-ui/dist/index.html
